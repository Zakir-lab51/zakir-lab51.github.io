<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zakir's Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #dbeafe, transparent 35%),
        radial-gradient(circle at bottom right, #fce7f3, transparent 35%),
        linear-gradient(135deg, #f8fafc, #eef2ff);
      color: #111827;
      padding: 24px;
    }

    .page {
      min-height: 100vh;
      max-width: 1100px;
      margin: auto;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 45px 10px 35px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      font-size: 13px;
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.05;
      margin-bottom: 14px;
      letter-spacing: -1.5px;
    }

    .subtitle {
      font-size: 18px;
      color: #4b5563;
      max-width: 620px;
      margin: auto;
      line-height: 1.6;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 22px;
      margin-top: 25px;
      flex: 1;
      align-content: start;
    }

    .tile {
      position: relative;
      min-height: 220px;
      padding: 28px;
      border-radius: 30px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 22px 55px rgba(0,0,0,0.10);
      border: 1px solid rgba(255,255,255,0.8);
      text-decoration: none;
      color: #111827;
      overflow: hidden;
      transition: 0.35s ease;
    }

    .tile::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -60px;
      top: -60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      opacity: 0.22;
      transition: 0.35s ease;
    }

    .tile:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 70px rgba(37,99,235,0.18);
    }

    .tile:hover::before {
      transform: scale(1.25);
      opacity: 0.32;
    }

    .tile-icon {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      display: grid;
      place-items: center;
      font-size: 30px;
      margin-bottom: 22px;
      box-shadow: 0 14px 28px rgba(37,99,235,0.25);
    }

    .tile h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .tile p {
      color: #4b5563;
      line-height: 1.5;
      font-size: 15px;
    }

    .arrow {
      position: absolute;
      right: 24px;
      bottom: 22px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: bold;
    }

    .bottom-area {
      padding: 38px 0 30px;
      text-align: center;
    }

    .coming-soon {
      display: inline-block;
      width: min(100%, 520px);
      padding: 20px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 18px 40px rgba(236,72,153,0.25);
      transition: 0.3s ease;
    }

    .coming-soon:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 24px 55px rgba(139,92,246,0.28);
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      header {
        padding-top: 32px;
      }

      .tile {
        min-height: 200px;
        padding: 24px;
      }

      .coming-soon {
        font-size: 18px;
        padding: 18px 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <div class="badge">Zakir Lab</div>
      <h1>My Learning Website</h1>
      <p class="subtitle">
        A place where I keep my mock tests, computer class materials, and future creations.
      </p>
    </header>

    <section class="tiles">
      <a class="tile" href="computer-class/">
        <div class="tile-icon">💻</div>
        <h2>Computer Class</h2>
        <p>
          Open chapters, practice sections, and full mock tests for computer application.
        </p>
        <div class="arrow">→</div>
      </a>
    </section>

    <div class="bottom-area">
      <a class="coming-soon" href="#">More Coming Soon</a>
    </div>
  </main>
</body>
</html>
