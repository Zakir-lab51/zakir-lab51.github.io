<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zakir Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --paper: #F7F7F5;
    --ink: #0D281F;
    --muted: #535D58;
    --line: rgba(13,40,31,.16);
    --soft: rgba(13,40,31,.055);
  }

  html {
    min-height: 100%;
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,.58), transparent 48%),
      radial-gradient(circle at 50% 32%, rgba(13,40,31,.045), transparent 38%);
  }

  body::after {
    content: "";
    position: fixed;
    inset: auto 0 0 0;
    height: min(44vh, 360px);
    z-index: 0;
    pointer-events: none;
    opacity: .09;
    filter: grayscale(1) contrast(1.05);
    background:
      linear-gradient(180deg, var(--paper) 0%, rgba(247,247,245,.18) 38%, var(--paper) 100%),
      url("https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/A_System_of_Anatomical_Plates_of_the_Human_Body%2C_vol._2_MET_DP355583.jpg/960px-A_System_of_Anatomical_Plates_of_the_Human_Body%2C_vol._2_MET_DP355583.jpg") center 20% / min(820px, 110vw) auto no-repeat;
    mix-blend-mode: multiply;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .top-nav {
    position: relative !important;
    top: auto !important;
    width: min(100%, 920px) !important;
    max-width: 920px !important;
    margin: 0 auto !important;
    padding: 18px 20px 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: clamp(16px, 3vw, 34px);
    background: transparent !important;
    border: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    min-height: auto !important;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -.01em;
    overflow-x: auto;
  }

  .top-nav a {
    position: relative;
    padding: 4px 0 7px;
    white-space: nowrap;
  }

  .top-nav a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 3px;
    height: 1px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .24s ease;
  }

  .top-nav a:hover::after,
  .top-nav a.active::after {
    transform: scaleX(1);
  }

  main {
    display: grid;
    place-items: center;
    padding: clamp(54px, 10vh, 108px) 24px 64px;
  }

  .hero {
    width: min(860px, 100%);
    text-align: center;
  }

  .kicker {
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  h1 {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(72px, 12vw, 148px);
    line-height: .88;
    font-weight: 600;
    letter-spacing: -.055em;
  }

  .intro {
    max-width: 500px;
    margin: clamp(42px, 7vh, 76px) auto 0;
    color: var(--muted);
    font-size: clamp(17px, 1.8vw, 21px);
    line-height: 1.48;
    letter-spacing: -.035em;
  }

  .quick-links {
    width: min(680px, 100%);
    margin: clamp(34px, 6vh, 58px) auto 0;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    border: 1px solid var(--soft);
    background: var(--soft);
  }

  .quick-links a {
    min-height: 62px;
    display: grid;
    place-items: center;
    background: rgba(247,247,245,.88);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: background .22s ease, color .22s ease;
  }

  .quick-links a:hover {
    background: var(--ink);
    color: var(--paper);
  }

  footer {
    position: relative;
    z-index: 1;
    width: min(920px, calc(100vw - 40px));
    margin: 0 auto;
    padding: 18px 0 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--soft);
  }

  .visitor-counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 7px;
    border: 1px solid var(--soft);
    border-radius: 999px;
    opacity: .8;
  }

  .visitor-counter span {
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .visitor-counter img {
    display: block;
    height: 18px;
    width: auto;
    max-width: 116px;
    filter: grayscale(1) saturate(.6);
  }

  @media (max-width: 700px) {
    .top-nav {
      justify-content: flex-start;
    }

    main {
      padding-top: 62px;
    }

    h1 {
      font-size: clamp(62px, 20vw, 92px);
    }

    .intro {
      margin-top: 38px;
      max-width: 350px;
    }

    .quick-links {
      grid-template-columns: 1fr;
      width: min(390px, 100%);
    }
  }
</style>
</head>
<body>
<div class="page">
  <nav class="top-nav" aria-label="Primary navigation">
    <a class="active" href="./">Home</a>
    <a href="study/">Subjects</a>
    <a href="anatomy/">Anatomy</a>
    <a href="physiology/">Physiology</a>
    <a href="recents/">Recents</a>
    <a href="suggest/">Contact</a>
  </nav>

  <main>
    <section class="hero" aria-label="Zakir Lab homepage">
      <div class="kicker">Medical Study Hub</div>
      <h1>Zakir Lab</h1>
      <p class="intro">A focused study space for anatomy, physiology, HDPC, communication skills and biochemistry notes.</p>

      <div class="quick-links" aria-label="Quick study links">
        <a href="study/">Start Studying</a>
        <a href="anatomy/">Anatomy PDFs</a>
        <a href="recents/">Recent Files</a>
      </div>
    </section>
  </main>

  <footer>
    <span>&copy; 2026 Zakir Lab</span>
    <a class="visitor-counter" href="https://hits.sh/zakir-lab51.github.io/" target="_blank" rel="noopener" aria-label="Zakir Lab visitor count">
      <span>Visits</span>
      <img src="https://hits.sh/zakir-lab51.github.io.svg?style=flat-square&label=views&color=6f6256&labelColor=fdfaf5&view=total" alt="Zakir Lab visitor count">
    </a>
  </footer>
</div>
</body>
</html>
