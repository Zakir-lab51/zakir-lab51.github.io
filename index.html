<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zakir's Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #fce7f3);
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      max-width: 500px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #444;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to My Website</h1>
    <p>I will keep my creations, mock tests, and projects here.</p>
    <a href="#">Coming Soon</a>
  </div>
</body>
</html>
