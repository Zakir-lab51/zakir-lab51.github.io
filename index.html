<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zakir Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --paper: #F7F7F5;
    --paper-soft: #ECEDE9;
    --ink: #0D281F;
    --muted: #525A56;
    --line: rgba(13, 40, 31, .22);
    --line-soft: rgba(13, 40, 31, .09);
  }

  html {
    min-height: 100%;
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255,255,255,.42), transparent 48%),
      radial-gradient(circle at 22% 36%, rgba(13,40,31,.035), transparent 35%);
    z-index: 0;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  .top-nav {
    width: min(88vw, 900px);
    margin-left: clamp(36px, 7.2vw, 92px);
    padding-top: 18px;
    display: flex;
    align-items: center;
    gap: clamp(18px, 3vw, 34px);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -.01em;
  }

  .top-nav a {
    position: relative;
    padding: 4px 0 7px;
    white-space: nowrap;
  }

  .top-nav a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 3px;
    height: 1px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .24s ease;
  }

  .top-nav a:hover::after,
  .top-nav a.active::after {
    transform: scaleX(1);
  }

  .hero {
    position: relative;
    min-height: 640px;
    display: grid;
    grid-template-columns: minmax(420px, 56vw) minmax(280px, 1fr);
    align-items: center;
    padding: 44px 0 64px;
  }

  .hero-copy {
    padding-left: clamp(44px, 10vw, 132px);
    max-width: 760px;
    text-align: center;
    transform: translateY(-8px);
  }

  .kicker {
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  h1 {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(82px, 9vw, 128px);
    line-height: .9;
    font-weight: 600;
    letter-spacing: -.05em;
  }

  .intro {
    max-width: 420px;
    margin: clamp(58px, 9vh, 96px) auto 0;
    color: var(--muted);
    font-size: clamp(17px, 1.8vw, 21px);
    line-height: 1.46;
    letter-spacing: -.035em;
  }

  .hero-art {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(43vw, 530px);
    overflow: hidden;
    opacity: .72;
    filter: grayscale(1) contrast(1.05);
    mix-blend-mode: multiply;
  }

  .hero-art::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, var(--paper) 0%, rgba(247,247,245,.62) 19%, rgba(247,247,245,.08) 42%),
      linear-gradient(180deg, rgba(247,247,245,.08), var(--paper) 98%);
    z-index: 2;
  }

  .hero-art img {
    position: absolute;
    top: -42px;
    right: -218px;
    width: min(670px, 64vw);
    height: calc(100% + 90px);
    object-fit: cover;
    object-position: center top;
  }

  .quick-links {
    width: min(620px, calc(100vw - 48px));
    margin: -80px auto 0 clamp(44px, 10vw, 132px);
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    border: 1px solid var(--line-soft);
    background: var(--line-soft);
  }

  .quick-links a {
    min-height: 62px;
    display: grid;
    place-items: center;
    background: rgba(247,247,245,.86);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    transition: background .25s ease, color .25s ease;
  }

  .quick-links a:hover {
    background: var(--ink);
    color: var(--paper);
  }

  footer {
    position: relative;
    z-index: 3;
    padding: 18px clamp(28px, 7vw, 92px) 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    color: var(--muted);
    font-size: 12px;
  }

  .visitor-counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 7px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    opacity: .8;
  }

  .visitor-counter span {
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .visitor-counter img {
    display: block;
    height: 18px;
    width: auto;
    max-width: 116px;
    filter: grayscale(1) saturate(.6);
  }

  @media (max-width: 900px) {
    .top-nav {
      width: auto;
      margin: 0;
      padding: 18px 20px 0;
      justify-content: center;
      gap: 18px;
      overflow-x: auto;
    }

    .hero {
      min-height: auto;
      grid-template-columns: 1fr;
      padding: 72px 20px 240px;
    }

    .hero-copy {
      padding-left: 0;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(66px, 18vw, 92px);
    }

    .intro {
      margin-top: 48px;
      max-width: 350px;
    }

    .hero-art {
      top: auto;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 260px;
      opacity: .42;
    }

    .hero-art::before {
      background:
        linear-gradient(180deg, var(--paper) 0%, rgba(247,247,245,.18) 36%, var(--paper) 100%),
        linear-gradient(90deg, var(--paper) 0%, rgba(247,247,245,.08) 48%, var(--paper) 100%);
    }

    .hero-art img {
      top: -120px;
      right: 50%;
      transform: translateX(50%);
      width: 460px;
      height: 600px;
    }

    .quick-links {
      margin: -178px auto 0;
      grid-template-columns: 1fr;
      width: min(390px, calc(100vw - 40px));
    }

    footer {
      flex-direction: column;
      justify-content: center;
      padding-bottom: 28px;
    }
  }
</style>
</head>
<body>
<div class="page">
  <nav class="top-nav" aria-label="Primary navigation">
    <a class="active" href="./">Home</a>
    <a href="study/">Subjects</a>
    <a href="anatomy/">Anatomy</a>
    <a href="physiology/">Physiology</a>
    <a href="recents/">Recents</a>
    <a href="suggest/">Contact</a>
  </nav>

  <main>
    <section class="hero" aria-label="Zakir Lab preview homepage">
      <div class="hero-copy">
        <div class="kicker">Medical Study Hub</div>
        <h1>Zakir Lab</h1>
        <p class="intro">A focused study space for anatomy, physiology, HDPC, communication skills and biochemistry notes.</p>
      </div>

      <div class="hero-art" aria-hidden="true">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/A_System_of_Anatomical_Plates_of_the_Human_Body%2C_vol._2_MET_DP355583.jpg/960px-A_System_of_Anatomical_Plates_of_the_Human_Body%2C_vol._2_MET_DP355583.jpg" alt=""/>
      </div>
    </section>

    <div class="quick-links" aria-label="Quick study links">
      <a href="study/">Start Studying</a>
      <a href="anatomy/">Anatomy PDFs</a>
      <a href="recents/">Recent Files</a>
    </div>
  </main>

  <footer>
    <span>© 2026 Zakir Lab</span>
    <a class="visitor-counter" href="https://hits.sh/zakir-lab51.github.io/" target="_blank" rel="noopener" aria-label="Zakir Lab visitor count">
      <span>Visits</span>
      <img src="https://hits.sh/zakir-lab51.github.io.svg?style=flat-square&label=views&color=6f6256&labelColor=fdfaf5&view=total" alt="Zakir Lab visitor count">
    </a>
  </footer>
</div>
</body>
</html>
